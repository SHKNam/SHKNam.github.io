<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 560" font-family="'Pretendard','Apple SD Gothic Neo',sans-serif" role="img" aria-label="DART AX Insights 화면 구성 목업">
  <text x="26" y="24" font-family="'JetBrains Mono',monospace" font-size="12" letter-spacing="2" fill="#8B99B3">화면 구성 목업 (와이어프레임)</text>
  <!-- 브라우저 프레임 -->
  <rect x="26" y="40" width="908" height="494" rx="14" fill="#10182A" stroke="#2C3A55" stroke-width="1.5"/>
  <circle cx="52" cy="62" r="5" fill="#2C3A55"/><circle cx="70" cy="62" r="5" fill="#2C3A55"/><circle cx="88" cy="62" r="5" fill="#2C3A55"/>
  <rect x="110" y="52" width="560" height="20" rx="10" fill="#151D2E" stroke="#2C3A55"/>
  <text x="124" y="66" font-size="11" fill="#8B99B3">DART 공시 기반 기업 분석 · AX 기회 도출</text>
  <!-- 검색 바 -->
  <rect x="50" y="90" width="640" height="38" rx="10" fill="#151D2E" stroke="#7C9CF5" stroke-width="1.4"/>
  <text x="66" y="114" font-size="13" fill="#E8EDF6">회사명 입력 → 사업보고서·재무 자동 수집</text>
  <rect x="702" y="90" width="106" height="38" rx="10" fill="#7C9CF5"/>
  <text x="755" y="114" font-size="13" font-weight="700" fill="#0E1420" text-anchor="middle">분석 시작</text>
  <!-- 탭 4개 -->
  <g font-size="12.5" font-weight="600">
    <rect x="50" y="146" width="150" height="32" rx="8" fill="#1B2740" stroke="#7C9CF5" stroke-width="1.4"/>
    <text x="125" y="167" fill="#C3D2FF" text-anchor="middle">비교 매트릭스</text>
    <rect x="208" y="146" width="150" height="32" rx="8" fill="#151D2E" stroke="#2C3A55"/>
    <text x="283" y="167" fill="#8B99B3" text-anchor="middle">회사 상세</text>
    <rect x="366" y="146" width="150" height="32" rx="8" fill="#151D2E" stroke="#2C3A55"/>
    <text x="441" y="167" fill="#8B99B3" text-anchor="middle">AX 리포트</text>
    <rect x="524" y="146" width="150" height="32" rx="8" fill="#151D2E" stroke="#2C3A55"/>
    <text x="599" y="167" fill="#8B99B3" text-anchor="middle">Q&amp;A</text>
  </g>
  <!-- 비교 매트릭스 패널 -->
  <rect x="50" y="196" width="524" height="310" rx="12" fill="#151D2E" stroke="#2C3A55"/>
  <text x="70" y="226" font-size="13" font-weight="700" fill="#E8EDF6">다회사 비교 매트릭스</text>
  <g stroke="#2C3A55" stroke-width="1">
    <line x1="70" y1="244" x2="554" y2="244"/>
    <line x1="70" y1="288" x2="554" y2="288"/>
    <line x1="70" y1="332" x2="554" y2="332"/>
    <line x1="70" y1="376" x2="554" y2="376"/>
    <line x1="230" y1="244" x2="230" y2="420"/>
    <line x1="392" y1="244" x2="392" y2="420"/>
  </g>
  <g font-size="11.5" fill="#8B99B3">
    <text x="80" y="268">매출·수익성</text>
    <text x="80" y="312">사업 부문 구조</text>
    <text x="80" y="356">R&amp;D · 투자</text>
    <text x="80" y="400">AX 기회 신호</text>
  </g>
  <g fill="#2C3A55">
    <rect x="244" y="256" width="120" height="10" rx="5"/><rect x="406" y="256" width="120" height="10" rx="5"/>
    <rect x="244" y="300" width="96" height="10" rx="5"/><rect x="406" y="300" width="130" height="10" rx="5"/>
    <rect x="244" y="344" width="130" height="10" rx="5"/><rect x="406" y="344" width="88" height="10" rx="5"/>
  </g>
  <rect x="244" y="388" width="120" height="10" rx="5" fill="#F0B35C" opacity="0.7"/>
  <rect x="406" y="388" width="96" height="10" rx="5" fill="#F0B35C" opacity="0.7"/>
  <text x="70" y="446" font-size="11" fill="#8B99B3">인용 chip 클릭 → 공시 원문 모달</text>
  <rect x="70" y="458" width="74" height="22" rx="11" fill="#1B2740" stroke="#7C9CF5"/>
  <text x="107" y="473" font-size="10.5" fill="#C3D2FF" text-anchor="middle">사업보고서 §2</text>
  <rect x="152" y="458" width="74" height="22" rx="11" fill="#1B2740" stroke="#7C9CF5"/>
  <text x="189" y="473" font-size="10.5" fill="#C3D2FF" text-anchor="middle">재무제표 주석</text>
  <!-- SSE 스트리밍 패널 -->
  <rect x="590" y="196" width="320" height="310" rx="12" fill="#151D2E" stroke="#2C3A55"/>
  <text x="608" y="226" font-size="13" font-weight="700" fill="#E8EDF6">AI 인사이트 — 실시간 스트리밍</text>
  <g fill="#2C3A55">
    <rect x="608" y="244" width="280" height="9" rx="4.5"/>
    <rect x="608" y="262" width="256" height="9" rx="4.5"/>
    <rect x="608" y="280" width="270" height="9" rx="4.5"/>
    <rect x="608" y="298" width="200" height="9" rx="4.5"/>
    <rect x="608" y="330" width="268" height="9" rx="4.5"/>
    <rect x="608" y="348" width="240" height="9" rx="4.5"/>
  </g>
  <rect x="608" y="366" width="150" height="9" rx="4.5" fill="#7C9CF5" opacity="0.8"/>
  <circle cx="768" cy="370" r="4" fill="#7C9CF5">
    <animate attributeName="opacity" values="1;0.2;1" dur="1.2s" repeatCount="indefinite"/>
  </circle>
  <text x="608" y="412" font-size="11" fill="#8B99B3">추천 질문 (프리페치)</text>
  <rect x="608" y="424" width="284" height="24" rx="12" fill="#10182A" stroke="#2C3A55"/>
  <text x="620" y="440" font-size="10.5" fill="#8B99B3">"두 회사의 신사업 투자 방향 차이는?"</text>
  <rect x="608" y="456" width="284" height="24" rx="12" fill="#10182A" stroke="#2C3A55"/>
  <text x="620" y="472" font-size="10.5" fill="#8B99B3">"AX 도입 여지가 큰 사업 부문은?"</text>
</svg>
