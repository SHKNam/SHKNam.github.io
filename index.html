<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>남승현 — Gen AI · Data Scientist</title>
  <meta name="description" content="RPA 자동화에서 Graph RAG까지 — 자동화와 데이터 사이언스를 잇는 Gen AI · Data Scientist 남승현의 포트폴리오" />
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- ── 히어로 ─────────────────────────────────────────── -->
  <header class="hero">
    <div class="wrap">
      <p class="eyebrow" id="hero-tag"></p>
      <h1 class="hero-name"><span id="hero-name-ko"></span> <span class="hero-name-en" id="hero-name-en"></span></h1>
      <p class="tagline" id="hero-tagline"></p>

      <!-- 시그니처: 커리어 여정 파이프라인 -->
      <div class="journey" id="journey" aria-label="커리어 여정"></div>

      <p class="about" id="hero-about"></p>

      <div class="hero-links" id="hero-links"></div>
    </div>
  </header>

  <!-- ── 프로젝트 ───────────────────────────────────────── -->
  <main class="wrap">
    <section aria-labelledby="projects-heading">
      <div class="section-head">
        <h2 id="projects-heading">Projects</h2>
        <p class="section-sub">클릭하면 문제 정의부터 아키텍처, 결과까지 상세 내용을 볼 수 있습니다.</p>
      </div>
      <nav class="filters" id="filters" aria-label="분야 필터"></nav>
      <div class="grid" id="grid"></div>
    </section>
  </main>

  <!-- ── 상세 모달 ──────────────────────────────────────── -->
  <div class="modal" id="modal" hidden>
    <div class="modal-backdrop" data-close></div>
    <div class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <button class="modal-close" data-close aria-label="닫기">✕</button>
      <div class="modal-body" id="modal-body"></div>
    </div>
  </div>

  <!-- ── 푸터 ───────────────────────────────────────────── -->
  <footer class="footer">
    <div class="wrap footer-inner">
      <img id="footer-photo" class="footer-photo" alt="남승현 프로필 사진" />
      <div class="footer-text">
        <p class="footer-name" id="footer-name"></p>
        <p class="footer-meta" id="footer-meta"></p>
      </div>
      <div class="footer-actions" id="footer-actions"></div>
    </div>
  </footer>

  <script src="js/data.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
