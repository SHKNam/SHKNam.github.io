  <g>
    <rect x="66" y="416" width="13" height="13" rx="3" fill="none" stroke="#7C9CF5" stroke-width="1.4"/>
    <path d="M69 422 l3 3 l5 -6" stroke="#7C9CF5" stroke-width="1.6" fill="none"/>
    <rect x="88" y="418" width="360" height="9" rx="4.5" fill="#2C3A55"/>
