<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 620" font-family="'Pretendard','Apple SD Gothic Neo',sans-serif" role="img" aria-label="주간 브리핑 산출물 구조 목업 (더미 콘텐츠)">
